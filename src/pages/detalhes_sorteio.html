<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Sorteio — Sorteio Online</title>
    <link rel="stylesheet" href="../style/global.css">
    <link rel="stylesheet" href="../style/detalhes_sorteio.css">
</head>
<body>
<div class="container">

    <header>
        <h1>Sorteio Online</h1>
        <div class="auth-links"></div>
    </header>

    <aside>
        <a href="../../index.html">Início</a>
        <a href="criar_sorteio.html">Criar Sorteio</a>
        <a href="meus_sorteios.html">Meus Sorteios</a>
        <a href="perfil.html">Perfil</a>
    </aside>

    <main>

        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Buscando detalhes do sorteio…</p>
        </div>

        <div id="detalhes-sorteio" class="detalhes-container" style="display:none;">

            <div class="capa-container">
                <img id="img-capa" src="" alt="Capa do Sorteio">
            </div>

            <div class="info-header">
                <div>
                    <h2 id="nome-sorteio"></h2>
                    <span id="status-sorteio" class="badge-status"></span>
                    
                    <p id="data-encerramento" style="display:none; margin-top: 10px; font-weight: bold;"></p>
                </div>

                <div class="acoes-sorteio" id="acoes-sorteio"></div>
            </div>

            <div id="ganhador-container" style="display:none;"></div>

            <div class="descricao-box">
                <h3>Sobre o Sorteio</h3>
                <p id="desc-sorteio">Nenhuma descrição fornecida.</p>
            </div>

            <div class="galeria-section">
                <h3>Galeria de Fotos</h3>
                <div id="galeria-fotos" class="galeria-grid"></div>
            </div>

        </div>

    </main>

    <footer>© 2026 SorteioOnline. Todos os direitos reservados.</footer>
</div>

<script src="../js/utils.js"></script>
<script src="../js/detalhes_sorteio.js"></script>
</body>
</html>
