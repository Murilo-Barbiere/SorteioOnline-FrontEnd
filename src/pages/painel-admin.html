<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio Online - Painel Admin</title>

    <link rel="stylesheet" href="../style/global.css">
    <link rel="stylesheet" href="../style/admin.css">
</head>
<body>
    <div class="admin-container">
        
        <aside class="sidebar">
            <h2>Painel Admin</h2>
            <nav>
                <a href="#" id="menu-sorteios" class="active" onclick="alternarAba('sorteios')">Sorteios</a>
                <a href="#" id="menu-usuarios" onclick="alternarAba('usuarios')">Usuários</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../../index.html" class="btn-voltar">Sair do Painel</a>
            </div>
        </aside>

        <main class="admin-content">
            
            <section id="secao-sorteios" class="content-section">
                <div class="section-header">
                    <h2>Gerenciar Sorteios</h2>
                </div>
                <div class="cards-grid" id="lista-admin-sorteios">
                    </div>
            </section>

            <section id="secao-usuarios" class="content-section" style="display: none;">
                <div class="section-header">
                    <h2>Gerenciar Usuários</h2>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-admin-usuarios">
                            </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
